name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Job 1: SonarCloud Analysis
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Full history needed for accurate analysis

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Job 2: Lint PHP Code
  lint-php:
    name: PHP Linting (CodeSniffer)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install PHP and CodeSniffer
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli
          wget -q https://squizlabs.github.io/PHP_CodeSniffer/phpcs.phar -O /usr/local/bin/phpcs
          chmod +x /usr/local/bin/phpcs

      - name: Run PHP_CodeSniffer
        run: phpcs --standard=PSR12 --extensions=php src/ index.php

  # Job 3: Run test suite
  testsuite-php:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Start Docker stack
        run: docker compose up -d --build

      - name: Wait for DB to be ready
        run: |
          for i in $(seq 1 15); do
            docker compose exec -T db mariadb -uroot -e "SELECT 1" addresses_test && break
            echo "Waiting for DB... ($i)"
            sleep 2
          done

      - name: Run PHPUnit
        run: docker compose exec -T web php vendor/bin/phpunit tests
