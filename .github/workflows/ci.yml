name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Job 1: Lint PHP Code
  lint-php:
    name: PHP Linting (CodeSniffer)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install PHP and CodeSniffer
        run: |
          sudo apt-get update
          sudo apt-get install -y php-cli
          wget -q https://squizlabs.github.io/PHP_CodeSniffer/phpcs.phar -O /usr/local/bin/phpcs
          chmod +x /usr/local/bin/phpcs

      - name: Run PHP_CodeSniffer
        run: phpcs --standard=PSR12 --extensions=php src/ index.php

  # Job 2: Run test suite and generate coverage
  testsuite-php:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Start Docker stack
        run: docker compose up -d --build

      - name: Wait for DB to be ready
        run: |
          for i in $(seq 1 15); do
            docker compose exec -T db mariadb -uroot -e "SELECT 1" addresses_test && break
            echo "Waiting for DB... ($i)"
            sleep 2
          done

      - name: Run PHPUnit with coverage
        id: phpunit
        run: docker compose exec -T -e XDEBUG_MODE=coverage web bash -c "mkdir -p coverage && php vendor/bin/phpunit tests --coverage-clover coverage/clover.xml"
        continue-on-error: true

      - name: Copy coverage report from container
        run: docker compose cp web:/var/www/html/coverage/clover.xml coverage/clover.xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/clover.xml

      - name: Fail if tests failed
        if: steps.phpunit.outcome == 'failure'
        run: exit 1

  # Job 3: SonarCloud Analysis (requires coverage from testsuite-php)
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: testsuite-php
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Full history needed for accurate analysis

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
