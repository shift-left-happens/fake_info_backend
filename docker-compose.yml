version: "3.9"

services:
  web:
    build: .
    ports:
      - '8080:80'
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: addresses
      DB_USER: root
      DB_PASSWORD: ''
    volumes:
      - ./src:/var/www/html/src   # only your source code
      - ./tests:/var/www/html/tests #Test files
    command: apache2-foreground

  db:
    image: mariadb:11
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
      MYSQL_ROOT_PASSWORD: ''
    volumes:
      - db_data:/var/lib/mysql
      - ./db/addresses.sql:/docker-entrypoint-initdb.d/01-addresses.sql:ro

volumes:
  db_data: